name: Build Windows Installer

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: "Create a GitHub Release and attach the installer"
        type: boolean
        default: false
      release_tag:
        description: "Tag name to use when creating a release (leave blank to skip)"
        type: string
        default: ""
  push:
    tags:
      - "v*"

concurrency:
  group: windows-installer-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-windows:
    name: Build & Package (Windows x64)
    runs-on: windows-latest
    timeout-minutes: 45

    env:
      ELECTRON_CACHE: ${{ github.workspace }}\.cache\electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}\.cache\electron-builder
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: python/requirements.txt

      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ELECTRON_CACHE }}
            ${{ env.ELECTRON_BUILDER_CACHE }}
          key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Cache PyInstaller bundle
        id: backend-cache
        uses: actions/cache@v4
        with:
          path: dist-python
          key: ${{ runner.os }}-backend-${{ hashFiles('python/**/*.py', 'python/requirements.txt', 'scripts/build-backend-win.ps1') }}

      - name: Install Node dependencies
        run: npm ci

      - name: Build Python backend (PyInstaller onedir)
        if: steps.backend-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: .\scripts\build-backend-win.ps1

      - name: Verify backend artifact
        shell: pwsh
        run: |
          $exe = "dist-python\colorexchange-backend\colorexchange-backend.exe"
          if (!(Test-Path $exe)) { throw "Missing backend exe at $exe" }
          $size = (Get-Item $exe).Length
          Write-Host "Backend exe size: $([math]::Round($size / 1MB, 2)) MB"

      - name: Build renderer & main
        run: npm run build

      - name: Package Windows NSIS installer
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win nsis --x64 --publish never

      - name: Resolve installer path
        id: resolve
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path dist -Filter "*.exe" |
            Where-Object { $_.Name -notlike "*unpacked*" } |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $installer) { throw "No installer .exe produced under dist/." }
          $size = [math]::Round($installer.Length / 1MB, 2)
          Write-Host "Installer: $($installer.FullName) ($size MB)"
          "installer_path=$($installer.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "installer_name=$($installer.Name)"    | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ColorExchange-Windows-x64
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/latest*.yml
          if-no-files-found: error
          retention-days: 30

      - name: Upload backend artifact (debug)
        uses: actions/upload-artifact@v4
        with:
          name: ColorExchange-Backend-Windows
          path: dist-python/colorexchange-backend/**
          if-no-files-found: error
          retention-days: 7

      - name: Create GitHub Release
        if: |
          startsWith(github.ref, 'refs/tags/v') ||
          (github.event_name == 'workflow_dispatch' && inputs.create_release == true && inputs.release_tag != '')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || inputs.release_tag }}
          name: ColorExchange ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || inputs.release_tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/*.exe
            dist/*.blockmap
            dist/latest*.yml
